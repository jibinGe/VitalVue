services:
  db:
    image: postgres:15.5-alpine
    container_name: vitalvue_db
    # host port intentionally not published (internal network only; restore via docker exec) — avoids 5432/5433 clashes
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vitalvue_net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: vitalvue_redis
    # host port not published (internal only) — avoids 6379 clash
    command: >
      redis-server --requirepass ${REDIS_PASS}  --rename-command FLUSHALL ""  --save 60 1
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping" ]
      interval: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - vitalvue_net

  backend:
    build: ./backend
    container_name: vitalvue_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./secrets/fcm-sa.json:/run/secrets/fcm-sa.json:ro   # FCM service account (gitignored) — Plan D
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379/0
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/fcm-sa.json
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - vitalvue_net

  # frontend:
  #   build: ./frontend
  #   container_name: vitalvue_frontend
  #   networks:
  #     - vitalvue_net

  nginx:
    image: nginx:alpine
    container_name: vitalvue_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      # - frontend
      - backend
    networks:
      - vitalvue_net
    restart: always

networks:
  vitalvue_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
