<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalVue | Live Ward Monitor</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --accent-gold: #c5a059;
            --danger: #ff4d4d;
            --success: #00e676;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .ward-title { font-size: 24px; font-weight: bold; }
        .status-badge { color: var(--success); font-size: 14px; }

        .patient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .patient-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .patient-card.critical {
            border-color: var(--danger);
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { background: #1e1e1e; }
            50% { background: #2d1a1a; }
            100% { background: #1e1e1e; }
        }

        .patient-info { margin-bottom: 15px; }
        .patient-name { font-size: 18px; font-weight: 600; color: var(--accent-gold); }
        .patient-id { font-size: 12px; color: #888; }

        .vitals-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .vital-box {
            background: #252525;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .label { font-size: 11px; color: #aaa; text-transform: uppercase; }
        .value { font-size: 22px; font-weight: bold; margin-top: 5px; }
        .unit { font-size: 12px; font-weight: normal; color: #888; }

        .alert-log {
            margin-top: 15px;
            font-size: 12px;
            color: var(--danger);
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="ward-title">VitalVue <span style="font-weight: 300;">| Ward Monitor</span></div>
        <div id="connection-status" class="status-badge">● System Live</div>
    </div>

    <div class="patient-grid" id="patient-grid">
        </div>

    <script>
        // CHANGE THIS to your actual ward ID
        const WARD_ID = 1; 
        const STREAM_URL = `http://localhost/api/v1/stream/ward-stream/${WARD_ID}`;

        const patientGrid = document.getElementById('patient-grid');
        const patients = {}; // Store patient elements to avoid full re-renders

        function getOrCreatePatientCard(patientId, patientName) {
            if (patients[patientId]) return patients[patientId];

            const card = document.createElement('div');
            card.className = 'patient-card';
            card.id = `patient-${patientId}`;
            card.innerHTML = `
                <div class="patient-info">
                    <div class="patient-name">${patientName || 'Patient ' + patientId}</div>
                    <div class="patient-id">ID: PAT-0${patientId}</div>
                </div>
                <div class="vitals-row">
                    <div class="vital-box">
                        <div class="label">Heart Rate</div>
                        <div class="value"><span id="hr-${patientId}">--</span> <span class="unit">bpm</span></div>
                    </div>
                    <div class="vital-box">
                        <div class="label">SpO2</div>
                        <div class="value"><span id="spo2-${patientId}">--</span> <span class="unit">%</span></div>
                    </div>
                    <div class="vital-box">
                        <div class="label">BP (Sys/Dia)</div>
                        <div class="value" style="font-size: 16px;"><span id="bp-${patientId}">--/--</span></div>
                    </div>
                    <div class="vital-box">
                        <div class="label">Temp</div>
                        <div class="value"><span id="temp-${patientId}">--</span> <span class="unit">°C</span></div>
                    </div>
                </div>
                <div id="alert-${patientId}" class="alert-log">⚠️ ABNORMAL VITAL DETECTED</div>
            `;
            patientGrid.appendChild(card);
            patients[patientId] = card;
            return card;
        }

        const eventSource = new EventSource(STREAM_URL);

        eventSource.addEventListener('ward_vital_update', (e) => {
            const data = JSON.parse(e.data);
            const { patient_id, patient_name, vitals } = data;
            
            getOrCreatePatientCard(patient_id, patient_name);

            // Update UI elements
            document.getElementById(`hr-${patient_id}`).innerText = vitals.heart_rate;
            document.getElementById(`spo2-${patient_id}`).innerText = vitals.spo2.toFixed(1);
            document.getElementById(`bp-${patient_id}`).innerText = `${vitals.bp_systolic}/${vitals.bp_diastolic}`;
            document.getElementById(`temp-${patient_id}`).innerText = vitals.temp.toFixed(1);
            
            // Clear critical styling if data is normal (you can add more complex logic here)
            if (vitals.spo2 >= 90) {
                document.getElementById(`patient-${patient_id}`).classList.remove('critical');
                document.getElementById(`alert-${patient_id}`).style.display = 'none';
            }
        });

        eventSource.addEventListener('ward_alert', (e) => {
            const data = JSON.parse(e.data);
            const patientId = data.patient_id;
            
            const card = document.getElementById(`patient-${patientId}`);
            if (card) {
                card.classList.add('critical');
                document.getElementById(`alert-${patientId}`).style.display = 'block';
                document.getElementById(`alert-${patientId}`).innerText = `🚨 ${data.vital_type} ALERT: ${data.triggered_value}`;
            }
        });

        eventSource.onerror = (err) => {
            console.error("EventSource failed:", err);
            
            const status = document.getElementById('connection-status');
            status.innerText = "● Connection Lost - Retrying...";
            status.style.color = "var(--danger)";
            
            // Optional: Force a page reload after 5 seconds of failure
            // setTimeout(() => {
            //    window.location.reload();
            // }, 5000);
        };
        eventSource.onopen = () => {
            const status = document.getElementById('connection-status');
            status.innerText = "● System Live";
            status.style.color = "var(--success)";
        };
    </script>
</body>
</html>
