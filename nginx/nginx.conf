# Mandatory events section
events {
    worker_connections 1024;
}

http {
    # Include mime types for correct file rendering
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Frontend (React)
        location / {
            proxy_pass http://vitalvue_frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API & SSE
        location /api/ {
            # Rewrite /api/login to /login for FastAPI
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://vitalvue_backend:8000;
            
            # Critical headers for SSE
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            
            # Timeout for long-lived SSE connections
            proxy_read_timeout 24h;
        }
    }
}
